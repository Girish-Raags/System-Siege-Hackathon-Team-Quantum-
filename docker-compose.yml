version: "3.9"

services:
  webguard:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/webguard.db
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@webguard.local}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe123!}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANOMALY_THRESHOLD=${ANOMALY_THRESHOLD:-18.0}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - webguard_data:/data
    restart: unless-stopped

volumes:
  webguard_data:
